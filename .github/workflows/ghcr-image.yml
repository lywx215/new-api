name: Publish GHCR image

on:
  push:
    tags:
      - 'v*-ghcr*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build'
        required: true
        type: string

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  frontend:
    name: Build frontend once
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: ${{ github.event_name == 'workflow_dispatch' && 0 || 1 }}
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve version
        shell: bash
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
            if ! git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
              echo "::error::Tag '$TAG' does not exist"
              exit 1
            fi
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "$TAG" > VERSION

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        working-directory: web
        run: bun install --frozen-lockfile || (rm -rf node_modules && bun install --frozen-lockfile)

      - name: Build default frontend
        working-directory: web/default
        env:
          CI: ''
          VITE_REACT_APP_VERSION: ${{ env.TAG }}
        run: bun run build

      - name: Build classic frontend
        working-directory: web/classic
        env:
          CI: ''
          VITE_REACT_APP_VERSION: ${{ env.TAG }}
        run: bun run build

      - name: Upload frontend assets
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: |
            web/default/dist
            web/classic/dist
          if-no-files-found: error
          retention-days: 1

  build:
    name: Build and push (${{ matrix.arch }})
    needs: frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: ${{ github.event_name == 'workflow_dispatch' && 0 || 1 }}
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve version
        shell: bash
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "$TAG" > VERSION

      - name: Download frontend assets
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '>=1.25.1'

      - name: Build backend
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          GOEXPERIMENT: greenteagc
        run: go build -ldflags "-s -w -X 'github.com/QuantumNous/new-api/common.Version=${TAG}'" -o new-api

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE_NAME }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ env.TAG }}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: .github/docker/Dockerfile.ghcr
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.TAG }}-${{ matrix.arch }}
            ${{ env.IMAGE_NAME }}:latest-${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

  manifest:
    name: Publish multi-arch manifests
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Resolve version
        shell: bash
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "TAG=$TAG" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish version manifest
        run: |
          docker buildx imagetools create \
            -t "${IMAGE_NAME}:${TAG}" \
            "${IMAGE_NAME}:${TAG}-amd64" \
            "${IMAGE_NAME}:${TAG}-arm64"

      - name: Publish latest manifest
        run: |
          docker buildx imagetools create \
            -t "${IMAGE_NAME}:latest" \
            "${IMAGE_NAME}:latest-amd64" \
            "${IMAGE_NAME}:latest-arm64"

      - name: Inspect published image
        run: docker buildx imagetools inspect "${IMAGE_NAME}:${TAG}"
